<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zivanta Tech | Coming Soon page</title>
  <meta
    name="description"
    content="Zivanta Tech is launching soon. Building modern digital solutions for ambitious businesses."
  />
  <style>
    :root {
      --bg: #060b1c;
      --bg-soft: #101938;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f5f7ff;
      --muted: #b8c0df;
      --brand: #7da3ff;
      --brand-strong: #5e88ff;
      --ring: rgba(125, 163, 255, 0.35);
      --success: #7ef0b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #1b2b62 0%, transparent 38%),
        radial-gradient(circle at 85% 15%, #203875 0%, transparent 35%),
        radial-gradient(circle at 50% 100%, #18295a 0%, transparent 40%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrapper {
      width: min(920px, 100%);
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), var(--card));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: clamp(24px, 4vw, 44px);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(126, 240, 184, 0.45);
      color: #dbffe8;
      background: rgba(126, 240, 184, 0.12);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.86rem;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 5px rgba(126, 240, 184, 0.18);
      animation: pulse 1.8s infinite ease;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(2rem, 4vw, 3.3rem);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.1vw, 1.2rem);
      max-width: 62ch;
      line-height: 1.6;
    }

    .highlight {
      color: var(--brand);
      font-weight: 700;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    form {
      display: flex;
      gap: 10px;
      flex: 1 1 420px;
      flex-wrap: wrap;
    }

    input[type="email"] {
      flex: 1 1 260px;
      min-height: 50px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0 15px;
      font-size: 0.98rem;
      outline: none;
    }

    input[type="email"]::placeholder {
      color: #ccd3ec;
    }

    input[type="email"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--ring);
    }

    button,
    .btn-link {
      min-height: 50px;
      border-radius: 12px;
      border: 0;
      padding: 0 18px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button {
      background: linear-gradient(120deg, var(--brand), var(--brand-strong));
      color: #fff;
      box-shadow: 0 10px 24px rgba(94, 136, 255, 0.36);
    }

    button:hover,
    .btn-link:hover {
      transform: translateY(-1px);
    }

    .btn-link {
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      padding-inline: 16px;
    }

    .meta {
      margin-top: 24px;
      color: #d8def7;
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 22px;
    }

    .meta strong {
      color: #ffffff;
    }

    footer {
      margin-top: 22px;
      color: #c8d0f0;
      font-size: 0.86rem;
      opacity: 0.94;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        border-radius: 18px;
      }

      .actions {
        margin-top: 20px;
      }

      button,
      .btn-link,
      input[type="email"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="card" aria-labelledby="title">
      <div class="badge" aria-label="Website launching soon">
        <span class="dot" aria-hidden="true"></span>
        Launching Soon
      </div>

      <h1 id="title">
        <span class="highlight">Zivanta Tech</span> is almost here.
      </h1>

      <p class="lead">
        We are building powerful, elegant digital products to help businesses move
        faster and scale smarter. Our official website is on the way.
      </p>

      <div class="actions">
        <form action="#" method="post">
          <label for="email" class="sr-only" hidden>Email address</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email for updates"
            required
          />
          <button type="submit">Notify Me</button>
        </form>
        <a class="btn-link" href="mailto:hello@zivantatech.in">Contact Us</a>
      </div>

      <div class="meta">
        <span><strong>Domain:</strong> www.zivantatech.in</span>
        <span><strong>Email:</strong> hello@zivantatech.in</span>
      </div>

      <footer>
        &copy; <span id="year"></span> Zivanta Tech. All rights reserved.
      </footer>
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
